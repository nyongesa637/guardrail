version: 2

# Uncomment the ecosystems that apply to guardrail. Each "directory"
# is the path (relative to the repo root) of a manifest file's parent
# directory.

updates:
  # --- GitHub Actions (always recommended) ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    commit-message:
      prefix: "ci(deps)"
      include: scope

