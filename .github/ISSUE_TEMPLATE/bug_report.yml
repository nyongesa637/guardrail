name: Bug report
description: Something doesn't work as documented.
title: "bug: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. **For security
        issues**, please use [Private Vulnerability Reporting][pvr]
        instead — see [`SECURITY.md`](../SECURITY.md).

        [pvr]: https://github.com/nyongesa637/guardrail/security/advisories/new

  - type: checkboxes
    id: pre-flight
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: This is **not** a security issue (I would otherwise use Private Vulnerability Reporting).
          required: true

  - type: input
    id: version
    attributes:
      label: guardrail version / commit SHA
      placeholder: a1b2c3d
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack traces
      render: shell

  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        - OS:      e.g. Ubuntu 24.04
        - Runtime: e.g. Node 20, Python 3.12
        - Browser: (if relevant)

  - type: checkboxes
    id: code-of-conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../CODE_OF_CONDUCT.md).
          required: true
